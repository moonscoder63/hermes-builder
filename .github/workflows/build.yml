name: build-hermes-image

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "git ref of NousResearch/hermes-agent to build (branch/tag/sha)"
        required: false
        default: "main"
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/hermes-agent
  TAG: isolated
  # rubik-platform orchestrator pulls this exact ref (provisionDedicatedHost /
  # provisionSharedHost / bootstrap / orchestrator-handler). Same image content
  # as hermes-agent:isolated — just the name/tag the platform expects.
  IMAGE_RUNTIME: ghcr.io/${{ github.repository_owner }}/hermes-runtime

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout this repo (workflow)
        uses: actions/checkout@v4

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Checkout NousResearch/hermes-agent
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ github.event.inputs.hermes_ref || 'main' }}
          path: hermes-agent

      - name: Show hermes-agent commit
        run: |
          cd hermes-agent
          git log -1 --oneline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./hermes-agent
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE_RUNTIME }}:stable
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image refs
        run: |
          echo "Pushed ${{ env.IMAGE }}:${{ env.TAG }}"
          echo "Pushed ${{ env.IMAGE }}:latest"
          echo "Pushed ${{ env.IMAGE_RUNTIME }}:stable"
